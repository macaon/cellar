# Cellar — Base DOSBox Staging configuration
#
# This file is seeded into every DOS project's config/ directory.
# Maintainers can edit it before publishing.  Game-specific settings
# (cycles, sound card, autoexec) live in dosbox-overrides.conf.
#
# DOSBox Staging applies settings from left to right on the command
# line, so dosbox-overrides.conf values take precedence over this file.

[sdl]
fullscreen = false
fullresolution = desktop
windowresolution = default
output = opengl
autolock = true

[dosbox]
machine = svga_s3
memsize = 16

[render]
aspect = true

[cpu]
core = auto
cputype = auto
cycles = auto

[mixer]
nosound = false
rate = 48000
blocksize = 1024

[midi]
mpu401 = intelligent
mididevice = fluidsynth

[sblaster]
sbtype = sb16
sbbase = 220
irq = 7
dma = 1
hdma = 5
oplmode = auto

[gus]
gus = false

[speaker]
pcspeaker = true
pcrate = 48000
tandy = auto

[joystick]
joysticktype = auto

[dos]
xms = true
ems = true
umb = true

[serial]
serial1 = dummy
serial2 = dummy
serial3 = disabled
serial4 = disabled
